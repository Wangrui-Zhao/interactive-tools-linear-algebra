<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Notation â Interactive</title>
  <style>
    body {
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      background: #fafafa;
      color: #222;
    }
    h2 { margin-bottom: 4px; font-size: 1.3em; font-weight: normal; }
    p.subtitle { color: #888; margin-top: 0; margin-bottom: 36px; font-style: italic; font-size: 0.9em; }
    .idx {
      text-align: center; font-size: 0.82em; color: #bbb;
      display: flex; align-items: center; justify-content: center;
      width: 76px; height: 22px;
    }
    .idx-side {
      width: 40px; text-align: center; font-size: 0.82em; color: #bbb;
      display: flex; align-items: center; justify-content: center; height: 76px;
    }
    .idx.active, .idx-side.active { color: #1a6fc4; font-weight: bold; }
    .matrix-outer { display: flex; flex-direction: column; align-items: flex-start; }
    .matrix-row-area { display: flex; align-items: center; }
    .bracket { font-size: 4em; color: #333; line-height: 1; font-weight: 100; user-select: none; }
    table { border-collapse: separate; border-spacing: 8px; }
    td {
      width: 68px; height: 68px; text-align: center; vertical-align: middle;
      border-radius: 8px; font-size: 1.15em; cursor: pointer; user-select: none;
      transition: background 0.12s, border-color 0.12s, box-shadow 0.12s;
      background: #fff; border: 1.5px solid #ddd; color: #333;
    }
    td.row-hi  { background: #fff8dc; border-color: #e8d060; }
    td.col-hi  { background: #e8f2ff; border-color: #90b8e8; }
    td.selected {
      background: #f5c518; border-color: #c8a000; color: #111; font-weight: bold;
      box-shadow: 0 0 0 3px rgba(245,197,24,0.35);
    }
    .dim-row { display: flex; gap: 20px; margin-bottom: 28px; align-items: center; }
    .dim-row label { font-size: 0.88em; color: #666; }
    .dim-row select {
      font-family: Georgia, serif; font-size: 0.88em; padding: 3px 8px;
      border: 1.5px solid #ccc; border-radius: 6px; background: #fff;
      color: #333; cursor: pointer; margin-left: 4px;
    }
  </style>
</head>
<body>
<div class="dim-row">
  <label>Rows <em>m</em>:
    <select id="sel-m" onchange="rebuild()">
      <option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option>
    </select>
  </label>
  <label>Columns <em>n</em>:
    <select id="sel-n" onchange="rebuild()">
      <option>1</option><option>2</option><option>3</option><option selected>4</option><option>5</option>
    </select>
  </label>
</div>
<div class="matrix-outer" id="matrix-outer"></div>
<script>
  let M = 4, N = 4, selI = null, selJ = null;
  function rebuild() {
    M = +document.getElementById('sel-m').value;
    N = +document.getElementById('sel-n').value;
    selI = null; selJ = null;
    render();
  }
  function render() {
    const outer = document.getElementById('matrix-outer');
    outer.innerHTML = '';
    const colHeader = document.createElement('div');
    colHeader.style.cssText = 'display:flex;align-items:center;padding-left:68px;margin-bottom:2px;';
    for (let c = 1; c <= N; c++) {
      const lbl = document.createElement('div');
      lbl.className = 'idx' + (c === selJ ? ' active' : '');
      lbl.id = 'idx-j-' + c;
      lbl.innerHTML = '<em>j</em>=' + c;
      colHeader.appendChild(lbl);
    }
    outer.appendChild(colHeader);
    const rowArea = document.createElement('div');
    rowArea.className = 'matrix-row-area';
    const rowLabels = document.createElement('div');
    rowLabels.style.cssText = 'display:flex;flex-direction:column;align-items:center;';
    for (let r = 1; r <= M; r++) {
      const lbl = document.createElement('div');
      lbl.className = 'idx-side' + (r === selI ? ' active' : '');
      lbl.id = 'idx-i-' + r;
      lbl.innerHTML = '<em>i</em>=' + r;
      rowLabels.appendChild(lbl);
    }
    rowArea.appendChild(rowLabels);
    const bL = document.createElement('div');
    bL.className = 'bracket'; bL.textContent = '(';
    rowArea.appendChild(bL);
    const tbl = document.createElement('table');
    for (let r = 1; r <= M; r++) {
      const tr = document.createElement('tr');
      for (let c = 1; c <= N; c++) {
        const td = document.createElement('td');
        td.id = 'cell-' + r + '-' + c;
        td.innerHTML = 'a<sub>' + r + '' + c + '</sub>';
        td.addEventListener('mouseenter', (function(ri,ci){ return function(){ selectCell(ri,ci); }; })(r,c));
        td.addEventListener('mouseleave', clearHighlights);
        tr.appendChild(td);
      }
      tbl.appendChild(tr);
    }
    rowArea.appendChild(tbl);
    const bR = document.createElement('div');
    bR.className = 'bracket'; bR.textContent = ')';
    rowArea.appendChild(bR);
    outer.appendChild(rowArea);
  }
  function selectCell(i, j) { selI = i; selJ = j; updateHighlights(); }
  function clearHighlights() {
    selI = null; selJ = null;
    for (let r = 1; r <= M; r++) {
      for (let c = 1; c <= N; c++) {
        const td = document.getElementById('cell-' + r + '-' + c);
        if (td) td.className = '';
      }
      const ri = document.getElementById('idx-i-' + r);
      if (ri) ri.className = 'idx-side';
    }
    for (let c = 1; c <= N; c++) {
      const ci = document.getElementById('idx-j-' + c);
      if (ci) ci.className = 'idx';
    }
  }
  function updateHighlights() {
    for (let r = 1; r <= M; r++) {
      for (let c = 1; c <= N; c++) {
        const td = document.getElementById('cell-' + r + '-' + c);
        if (!td) continue;
        if (r===selI && c===selJ) td.className = 'selected';
        else if (r===selI) td.className = 'row-hi';
        else if (c===selJ) td.className = 'col-hi';
        else td.className = '';
      }
      const ri = document.getElementById('idx-i-' + r);
      if (ri) ri.className = 'idx-side' + (r===selI ? ' active' : '');
    }
    for (let c = 1; c <= N; c++) {
      const ci = document.getElementById('idx-j-' + c);
      if (ci) ci.className = 'idx' + (c===selJ ? ' active' : '');
    }
  }
  render();
</script>
</body>
</html>
