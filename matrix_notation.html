<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Notation – Interactive</title>
  <style>
    body {
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      background: #fafafa;
      color: #222;
    }
    h2 { margin-bottom: 4px; }
    p.subtitle { color: #555; margin-top: 0; margin-bottom: 30px; }

    .controls {
      display: flex;
      gap: 60px;
      margin-bottom: 36px;
      align-items: center;
    }
    .drum {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .drum label {
      font-size: 1.1em;
      font-weight: bold;
    }
    .drum-roller {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fff;
      border: 2px solid #aaa;
      border-radius: 12px;
      overflow: hidden;
      width: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .drum-roller button {
      background: #eee;
      border: none;
      width: 100%;
      padding: 6px 0;
      font-size: 1.2em;
      cursor: pointer;
      transition: background 0.15s;
    }
    .drum-roller button:hover { background: #ddd; }
    .drum-value {
      font-size: 1.6em;
      font-weight: bold;
      padding: 10px 0;
      width: 100%;
      text-align: center;
      background: #fff;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      color: #1a6fc4;
    }

    .matrix-wrap {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .bracket {
      font-size: 4em;
      color: #333;
      line-height: 1;
      font-weight: 100;
    }
    table {
      border-collapse: separate;
      border-spacing: 6px;
    }
    td {
      width: 52px;
      height: 52px;
      text-align: center;
      vertical-align: middle;
      border-radius: 6px;
      font-size: 0.95em;
      transition: background 0.2s, color 0.2s;
      background: #fff;
      border: 1.5px solid #ccc;
      color: #333;
    }
    td.highlight {
      background: gold;
      border-color: #c8a000;
      color: #111;
      font-weight: bold;
      transform: scale(1.08);
      box-shadow: 0 0 8px rgba(200,160,0,0.5);
    }
    td.row-highlight {
      background: #fff3cc;
      border-color: #e0c860;
    }
    td.col-highlight {
      background: #e8f4ff;
      border-color: #90c0e8;
    }

    .info-box {
      margin-top: 10px;
      padding: 14px 28px;
      background: #fff;
      border: 1.5px solid #c8a000;
      border-radius: 10px;
      font-size: 1.05em;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .info-box span {
      color: #1a6fc4;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="controls">
  <div class="drum">
    <label>Row <em>i</em></label>
    <div class="drum-roller">
      <button onclick="change('i', -1)">▲</button>
      <div class="drum-value" id="val-i">1</div>
      <button onclick="change('i', 1)">▼</button>
    </div>
  </div>
  <div class="drum">
    <label>Column <em>j</em></label>
    <div class="drum-roller">
      <button onclick="change('j', -1)">▲</button>
      <div class="drum-value" id="val-j">1</div>
      <button onclick="change('j', 1)">▼</button>
    </div>
  </div>
</div>

<div class="matrix-wrap">
  <div class="bracket">(</div>
  <table id="matrix"></table>
  <div class="bracket">)</div>
</div>

<div class="info-box" id="info">
  The entry <span id="entry-label">a<sub>11</sub></span> is in row <span id="row-label">1</span>, column <span id="col-label">1</span>.
</div>

<script>
  const M = 4, N = 4;
  let selI = 1, selJ = 1;

  function buildMatrix() {
    const tbl = document.getElementById('matrix');
    tbl.innerHTML = '';
    for (let r = 1; r <= M; r++) {
      const tr = document.createElement('tr');
      for (let c = 1; c <= N; c++) {
        const td = document.createElement('td');
        td.id = `cell-${r}-${c}`;
        td.innerHTML = `a<sub>${r}${c}</sub>`;
        tr.appendChild(td);
      }
      tbl.appendChild(tr);
    }
  }

  function update() {
    // reset all
    for (let r = 1; r <= M; r++)
      for (let c = 1; c <= N; c++) {
        const td = document.getElementById(`cell-${r}-${c}`);
        td.className = '';
        if (r === selI && c !== selJ) td.className = 'row-highlight';
        else if (c === selJ && r !== selI) td.className = 'col-highlight';
      }
    document.getElementById(`cell-${selI}-${selJ}`).className = 'highlight';

    document.getElementById('val-i').textContent = selI;
    document.getElementById('val-j').textContent = selJ;
    document.getElementById('entry-label').innerHTML = `a<sub>${selI}${selJ}</sub>`;
    document.getElementById('row-label').textContent = selI;
    document.getElementById('col-label').textContent = selJ;
  }

  function change(axis, dir) {
    if (axis === 'i') selI = Math.min(Math.max(selI + dir, 1), M);
    else              selJ = Math.min(Math.max(selJ + dir, 1), N);
    update();
  }

  buildMatrix();
  update();
</script>
</body>
</html>
