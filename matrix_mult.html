<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<title>Matrix Multiplication</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Georgia, serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px; background: #fafafa; color: #222;
  }
  h2 { margin-bottom: 4px; text-align: center; }
  p.sub { color: #555; margin: 0 0 20px; font-style: italic; font-size: 0.93em; text-align: center; }

  /* inline dim spinner inside label */
  .mat-label {
    display: flex; align-items: center; gap: 4px;
    justify-content: center; margin-bottom: 4px;
    font-size: 0.88em; color: #666; font-style: italic;
    user-select: none;
  }
  .mat-name { font-weight: bold; font-style: normal; color: #444; margin-right: 2px; }
  .dim-spinner {
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .arr-btn {
    width: 20px; height: 14px; border: none; background: none;
    cursor: pointer; color: #bbb; font-size: 0.7em; line-height: 1;
    padding: 0; display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
  }
  .arr-btn:hover { color: #1a6fc4; }
  .dim-num {
    font-size: 0.95em; font-weight: bold; color: #444;
    min-width: 14px; text-align: center; font-style: normal;
  }
  .dim-x { padding: 0 1px; color: #aaa; font-style: normal; }

  .equation {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap; justify-content: center;
  }

  .op { font-size: 1.6em; color: #555; padding: 0 4px; }

  /* bracket wrapper */
  .bracket-wrap {
    display: flex; align-items: stretch; gap: 0;
  }
  .bracket {
    display: flex; align-items: center;
    font-size: 3.2em; font-weight: 100; color: #444;
    line-height: 1; padding: 0 2px;
    user-select: none;
  }

  /* matrix grid */
  .matrix-grid {
    display: grid;
    gap: 6px;
    padding: 8px 4px;
  }

  /* editable cells */
  input.cell {
    width: 52px; height: 36px;
    text-align: center; font-size: 1em; font-family: Georgia, serif;
    border: 1.5px solid #ccc; border-radius: 6px;
    background: #fff; color: #222;
    transition: background 0.2s, border-color 0.2s;
    outline: none;
  }
  input.cell:focus { border-color: #1a6fc4; background: #eef4ff; }

  /* result cells */
  .res-cell {
    width: 64px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1em; font-weight: bold; border-radius: 6px;
    border: 1.5px solid #27ae60; color: #27ae60; background: #f0faf4;
    cursor: default;
    transition: background 0.2s;
  }
  .res-cell:hover { background: #27ae60; color: #fff; }

  /* highlight states */
  input.cell.hl-row { background: #fff3b0; border-color: #c8a000; }
  input.cell.hl-col { background: #d6eeff; border-color: #2980b9; }

  /* error state */
  .error-banner {
    display: none;
    background: #fff0f0; border: 1.5px solid #e74c3c; border-radius: 10px;
    color: #c0392b; padding: 12px 28px; font-size: 0.97em;
    text-align: center; margin-top: 24px; max-width: 560px; width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .error-banner.visible { display: block; }
  .error-banner strong { font-weight: bold; }

  /* result overlay when invalid */
  .res-invalid {
    width: 64px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: #ccc; font-size: 1.4em;
  }

  /* formula display */
  .formula-box {
    margin-top: 24px;
    min-height: 72px;
    padding: 14px 28px;
    background: #fff; border: 1.5px solid #c8a000; border-radius: 10px;
    font-size: 0.97em; text-align: center; line-height: 2;
    max-width: 680px; width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: opacity 0.2s;
  }
  .formula-box.empty { opacity: 0.4; font-style: italic; color: #aaa; }
  .formula-table { border-collapse: collapse; margin: 0 auto; }
  .formula-table td { padding: 0 6px; line-height: 2; vertical-align: middle; }
  .formula-table .eq-col { text-align: center; padding: 0 8px; }
  .formula-table .expr-col { text-align: left; }

  .hint { margin-top: 10px; font-size: 0.85em; color: #999; font-style: italic; }

  .term-pos { color: #c8a000; font-weight: bold; }
  .term-vec { color: #2980b9; font-weight: bold; }
  .term-res { color: #27ae60; font-weight: bold; }

  .mat-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<p class="sub">Hover over a result entry to see which products are summed.<br>Edit any value to update live.</p>

<div class="equation">

  <!-- Matrix A -->
  <div class="mat-wrap">
    <div class="mat-label">
      <span class="mat-name">A</span>
      <span class="dim-x">(</span>
      <div class="dim-spinner">
        <button class="arr-btn" onclick="changeDim('M',1)">▲</button>
        <span class="dim-num" id="valM">4</span>
        <button class="arr-btn" onclick="changeDim('M',-1)">▼</button>
      </div>
      <span class="dim-x">×</span>
      <div class="dim-spinner">
        <button class="arr-btn" onclick="changeDim('N',1)">▲</button>
        <span class="dim-num" id="valN">3</span>
        <button class="arr-btn" onclick="changeDim('N',-1)">▼</button>
      </div>
      <span class="dim-x">)</span>
    </div>
    <div class="bracket-wrap">
      <div class="bracket">(</div>
      <div class="matrix-grid" id="matA"></div>
      <div class="bracket">)</div>
    </div>
  </div>

  <!-- Matrix B -->
  <div class="mat-wrap">
    <div class="mat-label">
      <span class="mat-name">B</span>
      <span class="dim-x">(</span>
      <div class="dim-spinner">
        <button class="arr-btn" onclick="changeDim('P',1)">▲</button>
        <span class="dim-num" id="valP">3</span>
        <button class="arr-btn" onclick="changeDim('P',-1)">▼</button>
      </div>
      <span class="dim-x">×</span>
      <div class="dim-spinner">
        <button class="arr-btn" onclick="changeDim('Q',1)">▲</button>
        <span class="dim-num" id="valQ">1</span>
        <button class="arr-btn" onclick="changeDim('Q',-1)">▼</button>
      </div>
      <span class="dim-x">)</span>
    </div>
    <div class="bracket-wrap">
      <div class="bracket">(</div>
      <div class="matrix-grid" id="matB"></div>
      <div class="bracket">)</div>
    </div>
  </div>

  <div id="resultSection" style="display:flex;align-items:center;gap:12px;">
    <div class="op">=</div>
    <!-- Result -->
    <div class="mat-wrap">
      <div class="mat-label">
        <span class="mat-name" style="font-style:italic;">AB</span>
        <span class="dim-x">(</span>
        <span class="dim-num" id="labelRM" style="font-weight:normal;color:#aaa;">4</span>
        <span class="dim-x">×</span>
        <span class="dim-num" id="labelRQ" style="font-weight:normal;color:#aaa;">1</span>
        <span class="dim-x">)</span>
      </div>
      <div class="bracket-wrap">
        <div class="bracket">(</div>
        <div class="matrix-grid" id="matResult"></div>
        <div class="bracket">)</div>
      </div>
    </div>
  </div>

</div>

<!-- Error banner -->
<div class="error-banner" id="errorBanner">
  The product <i>AB</i> is only defined if the number of columns of <i>A</i> is the same as the number of rows of <i>B</i>.
</div>

<div class="formula-box empty" id="formulaBox">← Hover over a result entry</div>

<script>
let M = 4, N = 3, P = 3, Q = 1;
const MAX = 6, MIN = 1;

// Stored values (persist across rebuilds)
let aVals = {}, bVals = {};

// Live input references
let aInputs = [], bInputs = [], resCells = [];
let currentHover = {row: -1, col: -1};

function changeDim(dim, delta) {
  saveValues();
  if (dim === 'M') M = Math.min(MAX, Math.max(MIN, M + delta));
  if (dim === 'N') N = Math.min(MAX, Math.max(MIN, N + delta));
  if (dim === 'P') P = Math.min(MAX, Math.max(MIN, P + delta));
  if (dim === 'Q') Q = Math.min(MAX, Math.max(MIN, Q + delta));
  updateDimDisplay();
  buildAll();
}

function updateDimDisplay() {
  document.getElementById('valM').textContent = M;
  document.getElementById('valN').textContent = N;
  document.getElementById('valP').textContent = P;
  document.getElementById('valQ').textContent = Q;
  document.getElementById('labelRM').textContent = M;
  document.getElementById('labelRQ').textContent = Q;
}

function saveValues() {
  for (let i = 0; i < aInputs.length; i++)
    for (let j = 0; j < (aInputs[i]||[]).length; j++)
      aVals[`${i},${j}`] = aInputs[i][j].value;
  for (let i = 0; i < bInputs.length; i++)
    for (let j = 0; j < (bInputs[i]||[]).length; j++)
      bVals[`${i},${j}`] = bInputs[i][j].value;
}

// Sensible defaults for initial state
const defaultA = [
  [ 1,  2,  0],
  [ 3,  1, -1],
  [ 0,  2,  4],
  [-1,  0,  2]
];
const defaultB = [
  [2],
  [1],
  [-1]
];

function getDefaultA(i, j) {
  if (aVals[`${i},${j}`] !== undefined) return aVals[`${i},${j}`];
  return (defaultA[i] !== undefined && defaultA[i][j] !== undefined) ? defaultA[i][j] : 0;
}
function getDefaultB(i, j) {
  if (bVals[`${i},${j}`] !== undefined) return bVals[`${i},${j}`];
  return (defaultB[i] !== undefined && defaultB[i][j] !== undefined) ? defaultB[i][j] : 0;
}

function buildMatrix(containerId, rows, cols, store, getDefault) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 52px)`;
  const inputs = [];
  for (let i = 0; i < rows; i++) {
    inputs[i] = [];
    for (let j = 0; j < cols; j++) {
      const inp = document.createElement('input');
      inp.type = 'number'; inp.className = 'cell';
      inp.value = getDefault(i, j);
      inp.dataset.row = i; inp.dataset.col = j;
      inp.addEventListener('input', updateResult);
      grid.appendChild(inp);
      inputs[i][j] = inp;
    }
  }
  return inputs;
}

function buildResult() {
  const grid = document.getElementById('matResult');
  grid.innerHTML = '';
  resCells = [];

  const valid = (N === P);
  if (!valid) {
    // Show placeholder dashes
    grid.style.gridTemplateColumns = `repeat(${Q}, 64px)`;
    for (let i = 0; i < M; i++) {
      for (let j = 0; j < Q; j++) {
        const d = document.createElement('div');
        d.className = 'res-invalid'; d.textContent = '—';
        grid.appendChild(d);
      }
    }
    return;
  }

  grid.style.gridTemplateColumns = `repeat(${Q}, 64px)`;
  for (let i = 0; i < M; i++) {
    resCells[i] = [];
    for (let j = 0; j < Q; j++) {
      const cell = document.createElement('div');
      cell.className = 'res-cell';
      cell.dataset.row = i; cell.dataset.col = j;
      cell.addEventListener('mouseenter', () => highlightCell(i, j));
      cell.addEventListener('mouseleave', clearHighlight);
      grid.appendChild(cell);
      resCells[i][j] = cell;
    }
  }
}

function buildAll() {
  aInputs = buildMatrix('matA', M, N, aVals, getDefaultA);
  bInputs = buildMatrix('matB', P, Q, bVals, getDefaultB);
  buildResult();
  clearHighlight();
  updateResult();
}

function getA(i, j) { return parseFloat(aInputs[i][j].value) || 0; }
function getB(i, j) { return parseFloat(bInputs[i][j].value) || 0; }

function computeCell(i, j) {
  let sum = 0;
  for (let k = 0; k < N; k++) sum += getA(i, k) * getB(k, j);
  return sum;
}

function updateResult() {
  const valid = (N === P);
  const banner = document.getElementById('errorBanner');
  const formulaBox = document.getElementById('formulaBox');

  const resultSection = document.getElementById('resultSection');
  if (!valid) {
    banner.classList.add('visible');
    formulaBox.style.display = 'none';
    resultSection.style.display = 'none';
    return;
  }

  banner.classList.remove('visible');
  formulaBox.style.display = '';
  resultSection.style.display = 'flex';

  for (let i = 0; i < M; i++) {
    for (let j = 0; j < Q; j++) {
      const val = computeCell(i, j);
      resCells[i][j].textContent = Number.isInteger(val) ? val : val.toFixed(2);
    }
  }
  // refresh formula if hovering
  if (currentHover.row >= 0) showFormula(currentHover.row, currentHover.col);
}

function highlightCell(row, col) {
  if (N !== P) return;
  currentHover = {row, col};
  // highlight row `row` of A
  for (let r = 0; r < M; r++)
    for (let c = 0; c < N; c++)
      aInputs[r][c].classList.toggle('hl-row', r === row);
  // highlight col `col` of B
  for (let r = 0; r < P; r++)
    for (let c = 0; c < Q; c++)
      bInputs[r][c].classList.toggle('hl-col', c === col);
  showFormula(row, col);
}

function clearHighlight() {
  currentHover = {row: -1, col: -1};
  for (let r = 0; r < M; r++)
    for (let c = 0; c < N; c++)
      aInputs[r]?.[c]?.classList.remove('hl-row');
  for (let r = 0; r < P; r++)
    for (let c = 0; c < Q; c++)
      bInputs[r]?.[c]?.classList.remove('hl-col');
  const box = document.getElementById('formulaBox');
  box.innerHTML = '← Hover over a result entry';
  box.className = 'formula-box empty';
}

function showFormula(row, col) {
  const box = document.getElementById('formulaBox');
  box.className = 'formula-box';

  const letterTerms = [];
  for (let k = 0; k < N; k++) {
    const aStr = `<span class="term-pos">a<sub>${row+1}${k+1}</sub></span>`;
    const bStr = `<span class="term-vec">b<sub>${k+1}${col+1}</sub></span>`;
    letterTerms.push(`${aStr}·${bStr}`);
  }

  const numTerms = [];
  for (let k = 0; k < N; k++) {
    const a = getA(row, k), b = getB(k, col);
    numTerms.push(`<span class="term-pos">${a}</span>·<span class="term-vec">${b}</span>`);
  }

  const result = computeCell(row, col);
  const resVal = Number.isInteger(result) ? result : result.toFixed(2);

  box.innerHTML = `
    <table class="formula-table">
      <tr>
        <td>(AB)<sub>${row+1},${col+1}</sub></td>
        <td class="eq-col">=</td>
        <td class="expr-col">${letterTerms.join(' + ')}</td>
      </tr>
      <tr>
        <td></td>
        <td class="eq-col">=</td>
        <td class="expr-col">${numTerms.join(' + ')}</td>
      </tr>
      <tr>
        <td></td>
        <td class="eq-col">=</td>
        <td class="expr-col"><span class="term-res">${resVal}</span></td>
      </tr>
    </table>`;
}

// Init
buildAll();
</script>
</body>
</html>
